<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Mission | TravelBuddy</title>
    <style>
        /* Reusing our Modern Design System & Variables */
        :root {
            --primary-dark: #0b3c46;
            --accent-gold: #f4a261;
            --bg-light: #f4f9f9;
            --card-bg: #ffffff;
            --text-main: #2b3a42;
            --text-muted: #62757f;
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Glassmorphic Header */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(11, 60, 70, 0.06);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-dark);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent-gold);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 16px;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--primary-dark);
            opacity: 0.8;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #ee8a3a 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(244, 162, 97, 0.3);
        }

        /* Content Container */
        .content-container {
            max-width: 800px;
            margin: 80px auto 120px auto;
            padding: 0 24px;
        }

        .mission-box {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #175461 100%);
            color: white;
            padding: 60px 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 40px rgba(11, 60, 70, 0.1);
            text-align: center;
            margin-bottom: 60px;
        }

        .mission-box h1 {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-gold);
            margin: 0 0 24px 0;
        }

        .mission-box p {
            font-size: 26px;
            line-height: 1.5;
            font-weight: 600;
            margin: 0;
        }

        .story-text h2 {
            font-size: 32px;
            color: var(--primary-dark);
            margin-top: 40px;
            letter-spacing: -0.5px;
        }

        .story-text p {
            font-size: 18px;
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* Minimal Footer */
        footer {
            background: var(--card-bg);
            border-top: 1px solid rgba(11, 60, 70, 0.06);
            padding: 40px 24px;
            text-align: center;
        }

        footer p {
            color: var(--text-muted);
            font-size: 15px;
            margin: 0;
        }
    </style>
</head>
<body>

        <div class="nav-container">
            <a href="index.html" class="logo">Travel<span>Buddy</span></a>
            <nav>

                <a href="holidays.html">Holidays</a>
                <a href="about.html" style="color: var(--accent-gold);">Our Mission</a>
                <a href="#" class="btn btn-primary">Get Started</a>
            </nav>
        </div>
    </header>

    <main class="content-container">
